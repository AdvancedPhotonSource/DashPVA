# Required Setup
DETECTOR_PREFIX = 'dp-ADSim'
OUTPUT_FILE_LOCATION = 'NEW_TEST.h5' # file must end with .h5 # can probably be made into it's own section
CONSUMER_MODE = 'continuous' # options: continuous or vectorized, describes how consumer is performing analysis calculations

[CACHE_OPTIONS]
CACHING_MODE = '' # options: '', 'alignment', 'scan', or 'bin' describes whether the caching should be done the entire time, when a flag is seen, or if it should be put into bins based on number of frames

    [CACHE_OPTIONS.ALIGNMENT]
    MAX_CACHE_SIZE = 1000

    [CACHE_OPTIONS.SCAN]
    # FLAG PV MUST BE IN METADATA SECTION   
    FLAG_PV = 'ScanOn:Value' # a PV that will act as a flag to start caching
    START_SCAN = true
    STOP_SCAN = false 
    THRESHOLD = 0.05 # use if start and stop values are not binary/boolean
    MAX_CACHE_SIZE = 1000

    [CACHE_OPTIONS.BIN]
    COUNT = 10
    SIZE = 16

# Section for Metadata PVs
[METADATA]

    [METADATA.CA]
    # FLAG_PV = 'ScanOn:Value'

    [METADATA.PVA]

